<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order_cook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5.5.19/daisyui.min.css" rel="stylesheet" />
    <style>
        /* ซ่อน scrollbar สำหรับเมนูที่เลื่อนได้ */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-white shadow-sm px-4 md:px-6 py-4 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <span class="text-xl text-cyan-500">✦</span>
            <h1 class="text-lg md:text-xl font-bold text-gray-800">Food ordering system</h1>
        </div>
        <button onclick="window.location.href = '/public/index.html'"
            class="border border-gray-300 rounded-xl px-4 py-1.5 text-xs md:text-sm font-medium text-gray-600 hover:bg-gray-50 transition-all">
            Back to login
        </button>
    </nav>

    <main class="max-w-4xl mx-auto p-4 md:p-6">
        
        <div class="flex justify-center mb-8">
            <div class="flex bg-white rounded-full p-1.5 gap-1 w-full max-w-sm shadow-md border border-gray-100">
                <a href="/public/cooks/Dashdoard_cook.html" class="flex-1 text-center text-sm font-medium text-gray-400 rounded-full py-2 hover:bg-gray-100 transition-colors">
                    Dashboard
                </a>
                <span class="flex-1 text-center text-sm font-semibold text-white rounded-full py-2 shadow-sm" style="background-color: #1ac8db">
                    Order
                </span>
            </div>
        </div>

        <div class="flex justify-center mb-8">
            <div class="flex w-full max-w-md border-b border-gray-200">
                <button class="flex-1 text-center py-3 font-bold text-cyan-500 border-b-2 border-cyan-500 transition-all">
                    Order Now
                </button>
                <a href="/public/cooks/OrdeCooking_cook.html" class="flex-1 text-center py-3 font-semibold text-gray-400 hover:text-cyan-500">
                    Cooking
                </a>
                <a href="/public/cooks/OrdeCooking_cook2.html" class="flex-1 text-center py-3 font-semibold text-gray-400 hover:text-cyan-500">
                    Done
                </a>
            </div>
        </div>

        <div class="flex flex-col gap-4">
            
            <div class="bg-white rounded-2xl p-5 md:px-6 md:py-4 flex flex-col md:flex-row md:items-center gap-4 shadow-sm border border-gray-100 hover:shadow-md transition-all">
                
                <div class="flex justify-between items-center md:justify-start md:gap-8 flex-1">
                    <span class="font-bold text-gray-800 text-lg md:min-w-[120px]">Fried Rice</span>
                    <span class="text-sm bg-gray-100 px-3 py-1 rounded-lg text-gray-500 font-medium">Table 4</span>
                </div>

                <div class="flex items-center justify-between md:justify-end gap-2 border-t md:border-t-0 pt-3 md:pt-0">
                    <button class="flex-1 md:flex-none px-4 py-2 rounded-xl bg-orange-400 text-white text-xs font-bold uppercase tracking-wider shadow-sm shadow-orange-100">
                        pending
                    </button>
                    <button class="flex-1 md:flex-none px-4 py-2 rounded-xl text-gray-400 text-xs font-bold uppercase tracking-wider hover:bg-gray-50">
                        cooking
                    </button>
                    <button class="flex-1 md:flex-none px-4 py-2 rounded-xl text-gray-400 text-xs font-bold uppercase tracking-wider hover:bg-gray-50">
                        done
                    </button>
                </div>
            </div>

            <div class="text-center py-20">
                <div class="text-4xl mb-2 opacity-20">📋</div>
                <p class="text-gray-400 text-sm font-medium italic">No orders yet</p>
            </div>

        </div>
    </main>

</body>
</html>
