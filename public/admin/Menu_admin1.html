<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Food Ordering System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100 p-6 md:p-12 min-h-screen">

    <header class="flex justify-between items-center mb-10 max-w-6xl mx-auto">
        <div class="flex items-center gap-3">
            <div class="w-7 h-7 bg-black rotate-45 shadow-sm"></div>
            <h1 class="text-2xl font-bold tracking-tight">Food ordering system</h1>
        </div>
        <button onclick="window.location.href = 'index.html'" class="border border-gray-300 bg-white px-5 py-1.5 rounded-lg text-sm font-medium hover:bg-gray-50 transition-all">
            back to login
        </button>
    </header>

    <nav class="flex justify-center mb-12">
        <div class="bg-white rounded-full shadow-md p-1.5 flex items-center overflow-x-auto no-scrollbar gap-2 px-6">
            <button class="px-6 py-2 rounded-full text-gray-500 font-medium hover:text-black">Dashboard</button>
            <button class="px-6 py-2 rounded-full text-gray-500 font-medium hover:text-black">Order</button>
            <button class="px-6 py-2 rounded-full text-gray-500 font-medium hover:text-black">Cooks</button>
            <button class="bg-cyan-400 text-white px-10 py-2.5 rounded-full font-bold shadow-lg shadow-cyan-100">Menu</button>
        </div>
    </nav>

    <main id="product_display" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 max-w-6xl mx-auto">
    </main>

    <div id="addMenuModal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-5 backdrop-blur-sm">
        <div class="bg-white rounded-[2rem] w-full max-w-lg p-10 shadow-2xl transition-all">
            <div class="flex justify-between items-center mb-8">
                <h2 id="modalTitle" class="text-3xl font-black text-gray-800">Add New Item</h2>
                <button onclick="toggleModal(false)" class="text-gray-400 hover:text-black text-2xl">&times;</button>
            </div>
            
            <form id="menuForm" class="space-y-6">
                <input type="hidden" id="editIndex" value="-1">
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label class="block text-sm font-bold text-gray-500 mb-2 uppercase tracking-widest">Menu Name</label>
                        <input type="text" id="menuName" required placeholder="e.g. Tom Yum Goong" class="w-full bg-gray-50 border-none rounded-2xl p-4 focus:ring-2 focus:ring-cyan-400 transition-all outline-none">
                    </div>
                    <div class="col-span-2">
                        <label class="block text-sm font-bold text-gray-500 mb-2 uppercase tracking-widest">Price (baht)</label>
                        <input type="number" id="menuPrice" required placeholder="0.00" class="w-full bg-gray-50 border-none rounded-2xl p-4 focus:ring-2 focus:ring-cyan-400 transition-all outline-none">
                    </div>
                </div>

                <div class="border-4 border-dashed border-gray-100 rounded-3xl p-10 flex flex-col items-center justify-center text-gray-400 hover:border-cyan-200 transition-colors cursor-pointer">
                    <span class="text-4xl mb-2">📸</span>
                    <p class="font-bold text-sm">Upload Food Image</p>
                </div>

                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="toggleModal(false)" class="flex-1 py-4 bg-gray-100 text-gray-500 rounded-2xl font-bold hover:bg-gray-200 transition-all">Cancel</button>
                    <button type="submit" class="flex-1 py-4 bg-cyan-400 text-white rounded-2xl font-bold shadow-xl shadow-cyan-200 hover:bg-cyan-500 transition-all">Save Menu</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        
        // Load from LocalStorage if exists, else use default list
        var products = localStorage.getItem('products') ? JSON.parse(localStorage.getItem('products')) : [
             { "name": "Pad Thai", "price": 50, "image": "pad-thai.png" },
             { "name": "Fried Rice", "price": 45, "image": "fried-rice.png" },
             { "name": "Omelet", "price": 40, "image": "omelet.png" },
             { "name": "Green Curry", "price": 60, "image": "green-curry.png" },
             { "name": "Tom Yum Soup", "price": 70, "image": "tom-yum-soup.png" },
             { "name": "Pad Krapow", "price": 45, "image": "pad-krapow.png" }
        ];

        showProduct();

        function showProduct() {
            let data = `
                <div onclick="openAddModal()" class="cursor-pointer border-2 border-green-400 border-dashed rounded-3xl flex items-center justify-center min-h-[320px] bg-white hover:bg-green-50 transition-all group shadow-sm">
                    <div class="flex flex-col items-center">
                        <span class="text-8xl text-green-400 font-thin group-hover:scale-110 transition-transform">+</span>
                        <span class="text-green-500 font-semibold mt-2">Add New Menu</span>
                    </div>
                </div>
            `;

            products.forEach(function (product, index) {
                data += `
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 flex flex-col justify-between">
                    <div>
                        <div class="bg-slate-200 h-44 rounded-2xl flex justify-center items-center mb-5 overflow-hidden">
                            <img class="w-full h-full object-cover" src="/view/${product.image}" onerror="this.src='https://placehold.co/400x300?text=${product.name}'" alt="${product.name}">
                        </div>
                        <div class="flex justify-between items-center mb-6">
                            <span class="text-xl font-bold text-gray-800">${product.name}</span>
                            <span class="text-lg font-black text-gray-900">${product.price} <small class="text-xs text-gray-400">THB</small></span>
                        </div>
                    </div>
                    <div class="flex gap-4">
                        <button onclick="Disable(${index})" class="flex-1 bg-red-500 text-white py-3 rounded-xl font-bold hover:bg-red-600 transition-colors">Disable</button>
                        <button onclick="Edit(${index})" class="flex-1 bg-orange-400 text-white py-3 rounded-xl font-bold hover:bg-orange-500 transition-colors">Edit</button>
                    </div>
                </div>
                `;
            });
            document.querySelector('#product_display').innerHTML = data;
        }

        function openAddModal() {
            document.getElementById('modalTitle').innerText = "Add New Item";
            document.getElementById('editIndex').value = "-1";
            document.getElementById('menuForm').reset();
            toggleModal(true);
        }

        // Handle Form Submit (Both Add and Edit)
        document.getElementById('menuForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('menuName').value;
            const price = document.getElementById('menuPrice').value;
            const index = document.getElementById('editIndex').value;
            
            if (index === "-1") {
                // ADD NEW
                products.unshift({ "name": name, "price": price, "image": "default.png" });
            } else {
                // UPDATE EXISTING
                products[index].name = name;
                products[index].price = price;
            }
            
            saveToLocal();
            showProduct();
            toggleModal(false);
        });

        function toggleModal(isOpen) {
            const modal = document.getElementById('addMenuModal');
            modal.classList.toggle('hidden', !isOpen);
        }

        function saveToLocal() {
            localStorage.setItem('products', JSON.stringify(products));
        }

        function Disable(index) {
            Swal.fire({
                icon: "warning",
                title: "Are you sure?",
                text: "This item will be removed from the menu.",
                showCancelButton: true,
                confirmButtonColor: "#ef4444",
                confirmButtonText: "Yes, delete it!",
            }).then((result) => {
                if (result.isConfirmed) {
                    products.splice(index, 1);
                    saveToLocal();
                    showProduct();
                }
            });
        }

        function Edit(index) {
            const product = products[index];
            document.getElementById('modalTitle').innerText = "Edit Item";
            document.getElementById('menuName').value = product.name;
            document.getElementById('menuPrice').value = product.price;
            document.getElementById('editIndex').value = index;
            toggleModal(true);
        }

        window.onclick = function(event) {
            const modal = document.getElementById('addMenuModal');
            if (event.target == modal) toggleModal(false);
        }
    </script>
</body>
</html>
