<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Ordering System</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-base-100 min-h-screen">
    <!-- ══ NAVBAR ══ -->
    <div class="navbar bg-base-100 border-b border-base-200 px-4 md:px-10">
      <div class="flex-1 flex items-center gap-2">
        <span class="text-xl">✦</span>
        <span class="font-bold text-base md:text-lg">Food ordering system</span>
      </div>
      <div class="flex-none">
        <button
          class="btn btn-outline btn-sm rounded-xl text-sm"
         onclick="window.location.href = '/public/customers/Login_customers.html'"
        >
          back to login
        </button>
      </div>
    </div>

    <!-- ══ PILL TABS — centered ══ -->
    <div class="flex justify-center mt-6 md:mt-10 px-4">
      <div class="flex bg-base-100 rounded-full p-1.5 gap-1 overflow-x-auto w-full max-w-lg shadow-lg">
        <a href="/public/customers/Menu_customers.html" class="flex-1 min-w-max text-center text-sm font-medium text-base-content/50 rounded-full px-5 py-2 hover:bg-base-300 transition-colors cursor-pointer">
          menu
        </a>
        <a
          href="/public/customers/capt_customers.html"
          class="flex-1 min-w-max text-center text-sm font-medium text-base-content/50 rounded-full px-5 py-2 hover:bg-base-300 transition-colors cursor-pointer"
        >
          cart
        </a>
        <span
          class="flex-1 min-w-max text-center text-sm font-semibold text-white rounded-full px-5 py-2 cursor-default"
          style="background-color: #1ac8db"
        >
          check
        </span>
        <a
          href="/public/customers/PAYMENT.html"
          class="flex-1 min-w-max text-center text-sm font-medium text-base-content/50 rounded-full px-5 py-2 hover:bg-base-300 transition-colors cursor-pointer"
        >
          payment
        </a>
      </div>
    </div>

    <!-- ══ CHECK CONTENT — centered ══ -->
    <div class="flex flex-col items-center w-full px-4 mt-6 pb-16">
      <div class="w-full max-w-lg">
        <h2 class="text-2xl md:text-3xl font-bold mb-5">Waiting</h2>

        <!-- Order list -->
        <div id="orderList" class="flex flex-col gap-3">
          <!-- populated by JS -->
        </div>
      </div>
    </div>

    <!-- ══ TOAST ══ -->
    <div id="toastArea" class="toast toast-bottom toast-center z-50"></div>

    <script>
      /* ── ดึงข้อมูลจริงจาก Database แทน Demo Data ── */
      async function renderOrders() {
        const el = document.getElementById("orderList");
        
        // ดึงเลขโต๊ะจากที่ลูกค้า Login เข้ามา
        const tableNumber = sessionStorage.getItem("table");

        if (!tableNumber) {
          el.innerHTML = `
            <div class="text-center py-16 text-base-content/40">
              <p class="text-sm">กรุณาเข้าสู่ระบบก่อนครับ</p>
            </div>`;
          return;
        }

        try {
          // ส่ง request ไปหา API เช็คสถานะอาหารของโต๊ะนี้
          const response = await fetch(`http://localhost:3000/customers/orders?table=${tableNumber}`);
          
          if (response.ok) {
            const orders = await response.json();

            if (!orders || orders.length === 0) {
              el.innerHTML = `
                <div class="text-center py-16 text-base-content/40">
                  <div class="text-5xl mb-3">📋</div>
                  <p class="text-sm">No orders yet</p>
                </div>`;
              return;
            }

            // นำข้อมูลที่ได้จากฐานข้อมูลมาโชว์บนจอ
            el.innerHTML = orders.map((o) => {
              // ตกแต่งสถานะให้สวยงาม
              let isDone = (o.status === "serving" || o.status === "completed");
              let statusText = o.status.charAt(0).toUpperCase() + o.status.slice(1); // ทำให้ตัวแรกเป็นพิมพ์ใหญ่

              return `
                <div class="card bg-base-200 rounded-2xl">
                  <div class="card-body flex-row items-center justify-between p-4 md:p-5">
                    <span class="font-semibold text-sm md:text-base">${o.menu_name}</span>
                    <span class="font-semibold text-sm ${isDone ? "text-success" : "text-warning"}">
                      ${statusText}
                    </span>
                  </div>
                </div>
              `;
            }).join("");

          } else {
            el.innerHTML = `<p class="text-center text-error mt-10">เกิดข้อผิดพลาดในการดึงข้อมูล</p>`;
          }
        } catch (error) {
          console.error("Error fetching orders:", error);
          el.innerHTML = `<p class="text-center text-error mt-10">ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้</p>`;
        }
      }

      // ให้ฟังก์ชันทำงานทันทีที่โหลดหน้าเว็บเสร็จ
      window.onload = renderOrders;
    </script>
  </body>
</html>
