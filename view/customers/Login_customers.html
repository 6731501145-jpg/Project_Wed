<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Food Ordering</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>
  <body class="bg-base-100 min-h-screen flex flex-col">
    <div class="navbar bg-base-100 border-b border-base-200 px-4 md:px-10">
      <div class="flex-1 flex items-center gap-2">
        <span class="text-xl">✦</span>
        <span class="font-bold text-base md:text-lg">Food ordering system</span>
      </div>
      <div class="flex-none">
        <button
          class="btn btn-outline btn-sm rounded-xl text-sm"
          onclick="window.location.href = '/public/index.html'"
        >
          back to Home
        </button>
      </div>
    </div>

    <div class="flex flex-1 items-center justify-center px-4 py-12">
      <div class="w-full max-w-md">
        <h1 class="text-3xl font-bold mb-8 text-center">Welcome</h1>

        <div class="mb-5">
          <label class="block text-sm font-medium mb-1">Username</label>
          <input
            id="username"
            type="text"
            placeholder="Enter your name"
            class="input input-bordered w-full rounded-lg text-sm"
          />
        </div>

        <div class="mb-6">
          <label class="block text-sm font-medium mb-1">Table</label>
          <select id="tableSelect" class="select select-bordered w-full rounded-lg text-sm">
          <option value="" disabled selected>Loading tables...</option>
        </select>
        </div>

        <button
          onclick="doLogin()"
          class="btn w-full rounded-lg text-white font-semibold text-base"
          style="background-color: #1ac8db; border: none"
        >
          Login
        </button>
      </div>
    </div>

    <script>
      // ถ้ามี session อยู่แล้ว ให้เด้งไปหน้าเมนูทันที
      async function redirectIfSession() {
        try {
          const res = await fetch("http://localhost:3000/customers/session", { credentials: "include" });
          if (res.ok) {
            const data = await res.json();
            sessionStorage.setItem("username", data.username || "");
            sessionStorage.setItem("table", data.table);
            sessionStorage.setItem("customer_id", data.customer_id);
            window.location.href = "/customers/menu";
          }
        } catch (e) {
          // ignore
        }
      }
      async function doLogin() {
        // ดึงค่าและตัดช่องว่าง
        const username = document.getElementById("username").value.trim();
        const table = document.getElementById("tableSelect").value;

        // ตรวจสอบว่ากรอกข้อมูลครบหรือไม่
        if (!username || !table) {
          Swal.fire({
            icon: "warning",
            title: "Incomplete",
            text: "Please enter your name and select a table.",
            confirmButtonColor: "#1AC8DB",
            confirmButtonText: "OK",
          });
          return;
        }

        try {
          // เชื่อมต่อ API ของระบบหลังบ้าน (app.js)
          const response = await fetch(
            "http://localhost:3000/customers/login",
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              // แปลง table_number ให้เป็น Integer ตามที่ Database ต้องการ
              body: JSON.stringify({
                username: username,
                table_number: parseInt(table),
              }),
            },
          );

          if (response.ok) {
            // รับ Path ที่ส่งมาจาก Server (/public/customers/Menu_customers.html)
            const redirectPath = await response.text();

            // เซฟข้อมูลลง sessionStorage เพื่อให้หน้า Menu และ Check ดึงไปใช้ต่อ
            sessionStorage.setItem("username", username);
            sessionStorage.setItem("table", table);

            Swal.fire({
              icon: "success",
              title: `Welcome, ${username}!`,
              html: `You're at <b>Table ${table}</b>`,
              confirmButtonColor: "#1AC8DB",
              confirmButtonText: "Order Now",
              timer: 2000,
              timerProgressBar: true,
            }).then(() => {
              // เปลี่ยนหน้าต่างไปยัง Path ที่ได้จาก Server
              window.location.href = redirectPath;
            });
          } else {
            Swal.fire({
              icon: "error",
              title: "Login Failed",
              text: "Something went wrong",
              confirmButtonColor: "#1AC8DB",
            });
          }
        } catch (error) {
          console.error("Login Error: ", error);
          Swal.fire({
            icon: "error",
            title: "Error",
            text: "Cannot connect to server. Please check if app.js is running.",
            confirmButtonColor: "#1AC8DB",
          });
        }
      }
      async function loadTables() {
        const select = document.getElementById("tableSelect");
        select.innerHTML = '<option value="" disabled selected>Loading tables...</option>';
        try {
          const res = await fetch("http://localhost:3000/customers/tables", { cache: "no-store" });
          if (!res.ok) throw new Error("fetch failed");
          const tables = await res.json();

          select.innerHTML = "";
          if (!Array.isArray(tables) || tables.length === 0) {
            select.innerHTML = "<option disabled>No tables available</option>";
            return;
          }

          select.innerHTML = '<option value="" disabled selected>Select table</option>';
          tables.forEach(t => {
            const option = document.createElement("option");
            option.value = t.table_id;
            option.textContent = "Table " + t.table_number;
            select.appendChild(option);
          });
        } catch (err) {
          console.error("Load tables error:", err);
          select.innerHTML = "<option disabled>Cannot load tables</option>";
          Swal.fire({
            icon: "error",
            title: "Cannot load tables",
            text: "Please check server connection.",
            confirmButtonColor: "#1AC8DB",
          });
        }
      }

      window.onload = loadTables;
      redirectIfSession();
      // รองรับการกดปุ่ม Enter เพื่อ Login
      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") doLogin();
      });
    </script>
  </body>
</html>
