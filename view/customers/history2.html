<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You Page</title>
    <link rel="stylesheet" href="/view/css/history2.css"> 
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <h1 class="page-title">THANK YOU</h1>

    <div class="receipt-box">
        
        <div class="receipt-header" style="display: block; text-align: left;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                <span id="table-label">TABLE</span>
                <span class="date-text" id="receipt-date" style="font-size: 20px;">D/M/Y</span>
            </div>
            <div style="font-size: 20px; font-weight: normal; text-shadow: none; color: #555;">
                Customer : <span id="customer-name" style="font-weight: bold; color: #191A23;">ไม่ระบุชื่อ</span>
            </div>
        </div>
        
        <div class="receipt-body">
            <div class="column-headers" style="display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 10px;">
                <span style="flex: 1; text-align: left;">MENU</span>
                <span style="flex: 1; text-align: center;">PRICE</span>
                <span style="flex: 1; text-align: right;">AMOUNT</span>
            </div>
            
            <div class="item-list-space" id="receipt-items" style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px;">
                </div>
            
            <div class="total-price" id="receipt-total" style="font-weight: bold; font-size: 1.2em; text-align: right; margin-bottom: 20px;">
                TOTAL PRICE : 0 ฿
            </div>

            <div id="review-display-section" style="display: none; border-top: 1px dashed #ccc; padding-top: 20px; text-align: center;">
                <div id="receipt-stars" style="font-size: 28px; margin-bottom: 10px;">
                    </div>
                <div id="receipt-comment" style="font-style: italic; color: #555; font-size: 16px;">
                    </div>
            </div>
            
        </div>
        
    </div>

   <div class="action-buttons" style="display: flex; justify-content: center; gap: 20px; margin-top: 30px; margin-bottom: 50px;">
        <button id="btn-download" style="background: #FF9800; color: white; padding: 10px 30px; border-radius: 20px; border: none; font-weight: bold; font-size: 18px; cursor: pointer; font-family: 'Rockwell', 'Georgia', serif;">DOWNLOAD</button>
        
        <a href="PAYMENT.html" class="btn-goback" style="background: #1AC8DB; color: white; padding: 10px 30px; border-radius: 20px; text-decoration: none; font-weight: bold; font-size: 18px; display: flex; align-items: center;">GO BACK</a>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        const TABLE_ID = sessionStorage.getItem('table');

        if (!TABLE_ID) {
            alert('Please login first.');
            window.location.href = '/view/customers/Login_customers.html';
        }
        document.getElementById('table-label').innerText = `TABLE ${TABLE_ID}`;

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch(`${API_URL}/receipt/${TABLE_ID}`);

                if (!response.ok) {
                    document.getElementById('receipt-items').innerHTML = '<span style="color:red;">ไม่พบใบเสร็จ</span>';
                    document.getElementById('receipt-total').innerText = 'TOTAL PRICE : 0 ฿';
                    return;
                }

                const data = await response.json();

                if (data.items) {
                    // 🟢 นำชื่อลูกค้ามาใส่ (ถ้าไม่มีข้อมูลให้ขึ้นว่า 'ลูกค้าทั่วไป')
                    document.getElementById('customer-name').innerText = data.customerName || 'ลูกค้าทั่วไป';

                    if (data.paidAt) {
                        const dateObj = new Date(data.paidAt);
                        document.getElementById('receipt-date').innerText = 
                            dateObj.toLocaleDateString('th-TH') + ' ' + dateObj.toLocaleTimeString('th-TH');
                    } else {
                        document.getElementById('receipt-date').innerText = 'ยังไม่ได้ชำระเงิน';
                    }

                    const itemsContainer = document.getElementById('receipt-items');
                    itemsContainer.innerHTML = ''; 
                    
                    data.items.forEach(item => {
                        const row = document.createElement('div');
                        row.style.display = 'flex';
                        row.style.justifyContent = 'space-between';
                        row.innerHTML = `
                            <span style="flex: 1; text-align: left;">${item.menuName}</span>
                            <span style="flex: 1; text-align: center;">${item.price} ฿</span>
                            <span style="flex: 1; text-align: right;">x${item.amount}</span>
                        `;
                        itemsContainer.appendChild(row);
                    });

                    document.getElementById('receipt-total').innerText = `TOTAL PRICE : ${data.totalPrice} ฿`;
                }
            } catch (error) {
                console.error('Error fetching receipt:', error);
                document.getElementById('receipt-items').innerHTML = '<span style="color:red;">Cannot load receipt</span>';
            }

            const savedRating = localStorage.getItem('savedRating');
            const savedComment = localStorage.getItem('savedComment');

            if (savedRating && savedRating > 0) {
                document.getElementById('review-display-section').style.display = 'block';
                
                let starsHtml = '';
                for (let i = 1; i <= 5; i++) {
                    if (i <= savedRating) {
                        starsHtml += '<span style="color: #FFD700; margin: 0 2px;">★</span>'; 
                    } else {
                        starsHtml += '<span style="color: #ccc; margin: 0 2px;">★</span>';   
                    }
                }
                document.getElementById('receipt-stars').innerHTML = starsHtml;

                if (savedComment && savedComment.trim() !== '') {
                    document.getElementById('receipt-comment').innerText = `"${savedComment}"`;
                }
                
                localStorage.removeItem('savedRating');
                localStorage.removeItem('savedComment');
            }
        });

        document.getElementById('btn-download').addEventListener('click', function() {
            const btn = this;
            const originalText = btn.innerText;
            btn.innerText = 'DOWNLOADING...';
            btn.style.opacity = '0.7';

            const receiptElement = document.querySelector('.receipt-box');

            html2canvas(receiptElement, {
                scale: 2, 
                backgroundColor: "#ffffff" 
            }).then(canvas => {
                const imageURL = canvas.toDataURL('image/png');
                const downloadLink = document.createElement('a');
                downloadLink.href = imageURL;
                // 🟢 เปลี่ยนชื่อไฟล์ให้มีเบอร์โต๊ะ
                downloadLink.download = `Receipt_Table_${TABLE_ID}.png`; 
                
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);

                btn.innerText = originalText;
                btn.style.opacity = '1';
            });
        });
    </script>
</body>
</html>
