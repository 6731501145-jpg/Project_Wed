<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/view/css/PAYMEANT.css">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>PAYMENT</title>
</head>
<body>
    <div class="min-h-screen bg-gray-100 p-8">
    <div class="flex justify-between items-center mb-8">
        <div class="flex items-center gap-2">
          <span class="text-xl">✦</span>
          <h1 class="text-xl font-bold">Food ordering system</h1>
        </div>
        <button
          onclick="
            window.location.href = '/view/customers/Login_customers.html'
          "
          class="border border-gray-400 px-4 py-1 rounded-md text-sm hover:bg-gray-200"
        >
          back to login
        </button>
      </div>
    
    <div class="flex justify-center mt-6 md:mt-10 px-4">
      <div class="flex bg-base-100 rounded-full p-1.5 gap-1 overflow-x-auto w-full max-w-lg shadow-lg">
        <a href="'/customers/menu" class="flex-1 min-w-max text-center text-sm font-medium text-base-content/50 rounded-full px-5 py-2 hover:bg-base-300 transition-colors cursor-pointer">
            menu
        </span>
        <a href="/customers/cart" class="flex-1 min-w-max text-center text-sm font-medium text-base-content/50 rounded-full px-5 py-2 hover:bg-base-300 transition-colors cursor-pointer">
          cart
        </a>
        <a href="/view/customers/check_customers.html" class="flex-1 min-w-max text-center text-sm font-medium text-base-content/50 rounded-full px-5 py-2 hover:bg-base-300 transition-colors cursor-pointer">
          check
        </a>
        <a href="/view/customers/PAYMENT.html" class="flex-1 min-w-max text-center text-sm font-medium text-base-content/50 rounded-full px-5 py-2 hover:bg-base-300 transition-colors cursor-pointer"
        style="background-color: #1ac8db">
          payment
        </a>
      </div>
    </div>

    <div class="text-box" data-table-text>TABLE</div>

    <div class="text-box2">
        <div class="order-row order-header">
            <span class="col-menu">MENU</span>
            <span class="col-price">PRICE</span>
            <span class="col-number">NUMBER</span>
        </div>

        <div id="order-list">
            </div>
    </div>

    <div class="checkout">
        <a href="#" class="btn-checkout">CHECK OUT</a>
    </div>

    <div id="checkout-modal" class="modal-overlay">
        <div class="modal-content">
            <div style="text-align: right;">
                <span id="close-modal" style="cursor: pointer; font-size: 28px; color: #555;">&times;</span>
            </div>
            <h2 data-table-text>TABLE</h2>
            <div class="price-section">
                <h3>TOTAL PRICE</h3>
                <p><span id="modal-total-price">0</span> ฿</p> 
            </div>
            <div class="modal-buttons" style="display: flex; justify-content: center;">
                <button id="btn-confirm-pay" class="btn-check" style="width: 100%; border: none; cursor: pointer;">CONFIRM PAYMENT</button>
            </div>
        </div>
    </div>
    </div>
    <script>
    const API_URL = 'http://localhost:3000/api';
    let tableId = sessionStorage.getItem('table');
    // ถ้า sessionStorage หาย ลอง sync จาก server
    async function ensureSession() {
        if (tableId) return true;
        try {
            const res = await fetch('http://localhost:3000/customers/session', { credentials: 'include' });
            if (res.ok) {
                const data = await res.json();
                sessionStorage.setItem('table', data.table);
                sessionStorage.setItem('username', data.username || '');
                sessionStorage.setItem('customer_id', data.customer_id);
                tableId = data.table;
                return true;
            }
        } catch (e) {}
        alert('Please login first.');
        window.location.href = '/view/customers/Login_customers.html';
        return false;
    }

    // เปลี่ยนข้อความ TABLE ทั้งหมดบนหน้า
    document.querySelectorAll('[data-table-text]').forEach(el => {
        el.textContent = `TABLE ${tableId}`;
    });

    // โหลดข้อมูลรายการที่ยังไม่ได้จ่ายเงิน
    document.addEventListener('DOMContentLoaded', async () => {
        blockBack();
        const ok = await ensureSession();
        if (!ok) return;
        try {
            const response = await fetch(`${API_URL}/checkout/${tableId}`, {
                credentials: 'include'
            });
            if (response.status === 401) {
                alert('Session expired, please login again.');
                window.location.href = '/view/customers/Login_customers.html';
                return;
            }
            if (!response.ok) throw new Error('Cannot load checkout data');

            const data = await response.json();
            const orderList = document.getElementById('order-list');
            orderList.innerHTML = '';

            // กลุ่มรายการให้แสดงจำนวนถูกต้อง (รองรับทั้งกรณี API ส่ง amount มาแล้วหรือเป็นรายการย่อย)
            const grouped = {};
            (data.items || []).forEach(item => {
                const key = item.menuName;
                if (!grouped[key]) grouped[key] = { name: key, price: Number(item.price) || 0, qty: 0 };
                const addQty = Number(item.amount) || 1;
                grouped[key].qty += addQty;
            });

            const rows = Object.values(grouped);
            if (rows.length === 0) {
                orderList.innerHTML = '<div class="order-row"><span class="col-menu">No pending items</span></div>';
            } else {
                rows.forEach(item => {
                    const row = document.createElement('div');
                    row.className = 'order-row';
                    row.innerHTML = `<span class="col-menu">${item.name}</span><span class="col-price">${item.price} ฿</span><span class="col-number">x${item.qty}</span>`;
                    orderList.appendChild(row);
                });
            }

            document.getElementById('modal-total-price').innerText = data.totalPrice ?? 0;
        } catch (error) {
            console.error('Error fetching data:', error);
            document.getElementById('order-list').innerHTML = '<div class="order-row"><span class="col-menu text-red-500">Cannot load data</span></div>';
        }
    });

    // เปิด Modal
    document.querySelector('.btn-checkout').addEventListener('click', function(e) {
        e.preventDefault(); 
        document.getElementById('checkout-modal').style.display = 'flex';
    });

    // ปิด Modal
    document.getElementById('close-modal').addEventListener('click', function() {
        document.getElementById('checkout-modal').style.display = 'none';
    });

    // กดจ่ายเงิน -> ยิง API -> ไปหน้า REVIEW.html
    document.getElementById('btn-confirm-pay').addEventListener('click', async function() {
        this.innerText = 'PROCESSING...';
        this.style.opacity = '0.7';

        try {
            const response = await fetch(`${API_URL}/pay`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ tableId })
            });
            if (response.status === 401) {
                alert('Session expired, please login again.');
                window.location.href = '/view/customers/Login_customers.html';
                return;
            }
            const data = await response.json();
            
            if(data.success) {
                window.location.href = 'REVIEW.html'; // ไปหน้า Review
            } else {
                alert(data.message || data.error || 'Payment failed');
                this.innerText = 'CONFIRM PAYMENT';
                this.style.opacity = '1';
            }
        } catch (error) {
            console.error("Payment error:", error);
            alert("เกิดข้อผิดพลาดในการชำระเงิน");
            this.innerText = 'CONFIRM PAYMENT';
            this.style.opacity = '1';
        }
    });

    function blockBack() {
        history.pushState(null, "", location.href);
        window.addEventListener("popstate", () => {
            history.pushState(null, "", location.href);
        });
    }
    </script>
</body>
</html>
