<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/view/css/PAYMEANT.css">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>PAYMENT</title>
</head>
<body>
    <div class="min-h-screen bg-gray-100 p-8">
    <div class="flex justify-between items-center mb-8">
        <div class="flex items-center gap-2">
          <span class="text-xl">✦</span>
          <h1 class="text-xl font-bold">Food ordering system</h1>
        </div>
        <button
          onclick="
            window.location.href = '/view/customers/Login_customers.html'
          "
          class="border border-gray-400 px-4 py-1 rounded-md text-sm hover:bg-gray-200"
        >
          back to login
        </button>
      </div>
    
    <div class="flex justify-center mt-6 md:mt-10 px-4">
      <div class="flex bg-base-100 rounded-full p-1.5 gap-1 overflow-x-auto w-full max-w-lg shadow-lg">
        <a href="/customers/menu" class="flex-1 min-w-max text-center text-sm font-medium text-base-content/50 rounded-full px-5 py-2 hover:bg-base-300 transition-colors cursor-pointer">
            menu
        </span>
        <a href="/customers/cart" class="flex-1 min-w-max text-center text-sm font-medium text-base-content/50 rounded-full px-5 py-2 hover:bg-base-300 transition-colors cursor-pointer">
          cart
        </a>
        <a href="/customer/OpenOrder" class="flex-1 min-w-max text-center text-sm font-medium text-base-content/50 rounded-full px-5 py-2 hover:bg-base-300 transition-colors cursor-pointer">
          check
        </a>
        <a href="/customer/peyment" class="flex-1 min-w-max text-center text-sm font-medium text-base-content/50 rounded-full px-5 py-2 hover:bg-base-300 transition-colors cursor-pointer"
        style="background-color: #1ac8db">
          payment
        </a>
      </div>
    </div>

    <div class="text-box" data-table-text>TABLE</div>

    <div class="text-box2">
        <div class="order-row order-header">
            <span class="col-menu">MENU</span>
            <span class="col-price">PRICE</span>
            <span class="col-number">NUMBER</span>
        </div>

        <div id="order-list">
            </div>
    </div>

    <div class="checkout">
        <a href="#" class="btn-checkout">CHECK OUT</a>
    </div>

    <div id="checkout-modal" class="modal-overlay">
        <div class="modal-content">
            <div style="text-align: right;">
                <span id="close-modal" style="cursor: pointer; font-size: 28px; color: #555;">&times;</span>
            </div>
            <h2 data-table-text>TABLE</h2>
            <div class="price-section">
                <h3>TOTAL PRICE</h3>
                <p><span id="modal-total-price">0</span> ฿</p> 
            </div>
            <div class="modal-buttons" style="display: flex; justify-content: center;">
                <button id="btn-confirm-pay" class="btn-check" style="width: 100%; border: none; cursor: pointer;">CONFIRM PAYMENT</button>
            </div>
        </div>
    </div>
    </div>
    <script>
    const API_URL = 'http://localhost:3000/api';
const AUTH_URL = 'http://localhost:3000/customers/session';
let currentTableId = null; // ใช้ตัวแปรนี้แทน sessionStorage

// 1. ฟังก์ชันเช็ค Session และดึงข้อมูลโต๊ะจาก Server
async function getSessionData() {
    try {
        const res = await fetch(AUTH_URL, { credentials: 'include' });
        if (res.ok) {
            const data = await res.json();
            return data; // ส่งคืนข้อมูล { table: ..., username: ... }
        }
    } catch (e) {
        console.error("Session sync failed:", e);
    }
    return null;
}

// 2. ฟังก์ชันหลักในการโหลดข้อมูลหน้า Checkout
async function initializeCheckout() {
    blockBack();
    
    const session = await getSessionData();
    if (!session || !session.table) {
        // ถ้าไม่มี session ให้เด้งไปหน้า Login
        window.location.href = '/view/customers/Login_customers.html';
        return;
    }

    currentTableId = session.table;

    // เปลี่ยนข้อความ TABLE บนหน้าจอ
    document.querySelectorAll('[data-table-text]').forEach(el => {
        el.textContent = `TABLE ${currentTableId}`;
    });

    // โหลดรายการอาหารที่สั่ง
    await loadCheckoutItems();
}

// 3. ฟังก์ชันโหลดรายการที่ยังไม่ได้จ่ายเงิน
async function loadCheckoutItems() {
    const orderList = document.getElementById('order-list');
    try {
        const response = await fetch(`${API_URL}/checkout/${currentTableId}`, {
            credentials: 'include'
        });

        if (!response.ok) throw new Error('Cannot load checkout data');

        const data = await response.json();
        orderList.innerHTML = '';

        const grouped = {};
        (data.items || []).forEach(item => {
            const key = item.menuName;
            if (!grouped[key]) grouped[key] = { name: key, price: Number(item.price) || 0, qty: 0 };
            const addQty = Number(item.amount) || 1;
            grouped[key].qty += addQty;
        });

        const rows = Object.values(grouped);
        if (rows.length === 0) {
            orderList.innerHTML = '<div class="order-row"><span class="col-menu">No pending items</span></div>';
        } else {
            rows.forEach(item => {
                const row = document.createElement('div');
                row.className = 'order-row';
                row.innerHTML = `
                    <span class="col-menu">${item.name}</span>
                    <span class="col-price">${item.price} ฿</span>
                    <span class="col-number">x${item.qty}</span>
                `;
                orderList.appendChild(row);
            });
        }

        document.getElementById('modal-total-price').innerText = data.totalPrice ?? 0;
    } catch (error) {
        console.error('Error fetching data:', error);
        orderList.innerHTML = '<div class="order-row"><span class="col-menu text-red-500">Cannot load data</span></div>';
    }
}

// 4. การจัดการ Modal และปุ่มจ่ายเงิน
document.addEventListener('DOMContentLoaded', () => {
    initializeCheckout();

    // เปิด Modal
    const btnCheckout = document.querySelector('.btn-checkout');
    if (btnCheckout) {
        btnCheckout.addEventListener('click', (e) => {
            e.preventDefault(); 
            document.getElementById('checkout-modal').style.display = 'flex';
        });
    }

    // ปิด Modal
    const btnCloseModal = document.getElementById('close-modal');
    if (btnCloseModal) {
        btnCloseModal.addEventListener('click', () => {
            document.getElementById('checkout-modal').style.display = 'none';
        });
    }

    // ยืนยันการจ่ายเงิน
    const btnConfirmPay = document.getElementById('btn-confirm-pay');
    if (btnConfirmPay) {
        btnConfirmPay.addEventListener('click', async function() {
            this.innerText = 'PROCESSING...';
            this.disabled = true;
            this.style.opacity = '0.7';

            try {
                const response = await fetch(`${API_URL}/pay`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ tableId: currentTableId })
                });

                const data = await response.json();
                
                if (data.success) {
                    window.location.href = 'REVIEW.html'; 
                } else {
                    alert(data.message || 'Payment failed');
                    resetPayButton(this);
                }
            } catch (error) {
                console.error("Payment error:", error);
                alert("เกิดข้อผิดพลาดในการชำระเงิน");
                resetPayButton(this);
            }
        });
    }
});

function resetPayButton(btn) {
    btn.innerText = 'CONFIRM PAYMENT';
    btn.disabled = false;
    btn.style.opacity = '1';
}

function blockBack() {
    history.pushState(null, "", location.href);
    window.addEventListener("popstate", () => {
        history.pushState(null, "", location.href);
    });
}
    </script>
</body>
</html>
