<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Page</title>
    <link rel="stylesheet" href="/view/css/REVIEW.css">
    <style>
        /* เพิ่ม CSS เล็กน้อยเพื่อให้ดาวดูเหมือนกดได้ */
        .star { cursor: pointer; transition: color 0.2s; }
        .star-dark { color: #FFD700; } /* สมมติให้ดาวที่เลือกเป็นสีทอง */
        .star-white { color: #ccc; }   /* ดาวที่ยังไม่เลือกเป็นสีเทา */
    </style>
</head>
<body>

    <div class="review-container">
        <div class="review-header">
            REVIEW
        </div>
        
        <div class="review-content">
            <div class="stars" id="star-container">
                <span class="star star-white" data-value="1">★</span>
                <span class="star star-white" data-value="2">★</span>
                <span class="star star-white" data-value="3">★</span>
                <span class="star star-white" data-value="4">★</span>
                <span class="star star-white" data-value="5">★</span>
            </div>
            
            <textarea id="review-text" class="review-textbox" placeholder="Tell us about your experience..."></textarea>
        </div>
    </div>

    <div class="checkout-section">
        <a href="/view/customers/history2.html" id="btn-submit-review" class="btn-checkout">SUBMIT & CHECK OUT</a>
    </div>

    <script>
        (async () => {
            const API_URL = 'http://localhost:3000/api';
            let TABLE_ID = sessionStorage.getItem('table');
            if (!TABLE_ID) {
                try {
                    const res = await fetch(`${API_URL.replace('/api','')}/customers/session`, { credentials: 'include' });
                    if (res.ok) {
                        const data = await res.json();
                        sessionStorage.setItem('table', data.table);
                        sessionStorage.setItem('username', data.username || '');
                        sessionStorage.setItem('customer_id', data.customer_id);
                        TABLE_ID = data.table;
                    } else {
                        alert('Please login first.');
                        window.location.href = '/view/customers/Login_customers.html';
                        return;
                    }
                } catch (e) {
                    alert('Please login first.');
                    window.location.href = '/view/customers/Login_customers.html';
                    return;
                }
            }
            let currentRating = 0; // ตัวแปรเก็บคะแนนดาว

            // 1. ระบบกดให้คะแนนดาว
            const stars = document.querySelectorAll('.star');
            
            stars.forEach(star => {
                star.addEventListener('click', function() {
                    currentRating = this.getAttribute('data-value'); // ดึงค่า 1-5 ออกมา
                    
                    // วนลูปเปลี่ยนสีดาว
                    stars.forEach(s => {
                        if (s.getAttribute('data-value') <= currentRating) {
                            s.classList.add('star-dark');
                            s.classList.remove('star-white');
                        } else {
                            s.classList.add('star-white');
                            s.classList.remove('star-dark');
                        }
                    });
                });
            });

            // 2. ระบบกดปุ่ม Submit ส่งข้อมูลไป Server
            document.getElementById('btn-submit-review').addEventListener('click', async (e) => {
                e.preventDefault(); // ป้องกันไม่ให้ลิงก์เปลี่ยนหน้าทันที

                const reviewText = document.getElementById('review-text').value;

                // ตรวจสอบว่าลูกค้าให้ดาวหรือยัง (ใน Requirement บอกว่า Optional แต่ถ้าบังคับให้กดดาวค่อยเปิดใช้เงื่อนไขนี้ได้ครับ)
                if (currentRating === 0) {
                    alert('กรุณาให้คะแนนดาวก่อนนะครับ!');
                    return;
                }

                try {
                    // ยิงข้อมูลไปที่ API
                    const response = await fetch(`${API_URL}/review`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'include',
                        body: JSON.stringify({
                            tableId: TABLE_ID,
                            rating: currentRating,
                            comment: reviewText
                        })
                    });

                    if (response.status === 401) {
                        alert('Session expired, please login again.');
                        window.location.href = '/view/customers/Login_customers.html';
                        return;
                    }

                    const result = await response.json();

                    if (result.success) {
                        alert('Thank you for your review!');
                        
                        // 🟢 ฝากคะแนนและข้อความไว้ในเบราว์เซอร์ชั่วคราว
                        localStorage.setItem('savedRating', currentRating);
                        localStorage.setItem('savedComment', reviewText);

                        // ส่งรีวิวเสร็จ พาไปหน้าใบเสร็จ
                        window.location.href = 'history2.html'; 
                    }
                } catch (error) {
                    console.error('Error submitting review:', error);
                    alert('เกิดข้อผิดพลาดในการส่งรีวิว');
                }
            });
        })();
    </script>
</body>
</html>
