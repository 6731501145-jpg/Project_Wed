<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Order-Now</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-white min-h-screen no-scrollbar antialiased text-gray-800">

    <header>
        <div class="max-w-7xl mx-auto px-4 md:px-8 py-4">
            <div class="flex justify-between items-center gap-4 mb-6">
                <div class="flex items-center gap-2">
                  <span class="text-xl">✦</span>
                  <h1 class="text-xl font-bold">Food ordering system</h1>
                  </div>
                <button onclick="logout()"
                    class="border border-gray-300 text-gray-600 px-3 md:px-5 py-2 rounded-xl text-[10px] sm:text-xs md:text-sm font-semibold hover:bg-gray-50 transition-all active:scale-95 whitespace-nowrap shadow-sm">
                    back to login
                </button>
            </div>

            <div class="flex justify-center mt-6 md:mt-10 px-4">
             <div class="flex bg-white rounded-full p-1.5 gap-1 overflow-x-auto no-scrollbar w-full max-w-xl shadow-lg border border-gray-100">
              <a href="/admin/dashboard" class="flex-1 min-w-max text-center text-sm font-medium text-base-content/50 rounded-full px-5 py-2 hover:bg-base-300 transition-colors cursor-pointer">
                 Dashboard
              </a>
              <span class="flex-1 min-w-max text-center text-sm font-semibold text-white rounded-full px-5 py-2 cursor-default"
                  style="background-color: #1ac8db">Order
              </span>
              <a href="/admin/cooks" class="flex-1 min-w-max text-center text-sm font-medium text-base-content/50 rounded-full px-5 py-2 hover:bg-base-300 transition-colors cursor-pointer">
                 Cook
              </a>
              <a href="/admin/menu" class="flex-1 min-w-max text-center text-sm font-medium text-base-content/50 rounded-full px-5 py-2 hover:bg-base-300 transition-colors cursor-pointer">
               Menu
              </a>
             </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 md:px-12 space-y-6">

        <div class="flex gap-8 md:gap-16 border-b border-gray-100 pb-2">
            <button class="text-cyan-400 text-xl md:text-3xl font-bold">Order
                Now</button>
            <a href="/admin/order/history">
                <button class="text-gray-700 text-xl md:text-3xl font-bold hover:text-black transition-colors">
                    history
                </button>
            </a>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto no-scrollbar">
                <table class="w-full text-center border-collapse">
                    <thead class="bg-gray-100">
                        <tr>
                            <th class="py-4 px-4 text-lg md:text-2xl font-bold text-gray-800">Order</th>
                            <th class="py-4 px-4 text-lg md:text-2xl font-bold text-gray-800">Time</th>
                            <th class="py-4 px-4 text-lg md:text-2xl font-bold text-gray-800">Table</th>
                            <th class="py-4 px-4 text-lg md:text-2xl font-bold text-gray-800">Status</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-50">
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="py-5 px-4 text-base md:text-xl font-medium">Fried Rice</td>
                            <td class="py-5 px-4 text-base md:text-xl font-medium">12.00 AM</td>
                            <td class="py-5 px-4 text-base md:text-xl font-medium">4</td>
                            <td class="py-5 px-4 text-base md:text-xl font-medium text-gray-700">Cooking</td>
                        </tr>
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="py-5 px-4 text-base md:text-xl font-medium">Pad Thai</td>
                            <td class="py-5 px-4 text-base md:text-xl font-medium">12.00 AM</td>
                            <td class="py-5 px-4 text-base md:text-xl font-medium">4</td>
                            <td class="py-5 px-4 text-base md:text-xl font-medium text-gray-700">Cooking</td>
                        </tr>
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="py-5 px-4 text-base md:text-xl font-medium">omelet</td>
                            <td class="py-5 px-4 text-base md:text-xl font-medium">12.00 AM</td>
                            <td class="py-5 px-4 text-base md:text-xl font-medium">4</td>
                            <td class="py-5 px-4 text-base md:text-xl font-medium text-gray-700">Cooking</td>
                        </tr>
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="py-5 px-4 text-base md:text-xl font-medium">Tom Yum Goong</td>
                            <td class="py-5 px-4 text-base md:text-xl font-medium">12.00 AM</td>
                            <td class="py-5 px-4 text-base md:text-xl font-medium">4</td>
                            <td class="py-5 px-4 text-base md:text-xl font-medium font-bold">Done</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="h-10"></div>
    </main>

    <script src="/js/OrderNow_admin.js"></script>
</body>

</html>
