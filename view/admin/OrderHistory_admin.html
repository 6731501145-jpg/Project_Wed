<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Order-history</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-white min-h-screen no-scrollbar antialiased text-gray-800">

    <header>
        <div class="max-w-7xl mx-auto">
            <div class="max-w-7xl mx-auto px-4 md:px-8 py-4">
            <div class="flex justify-between items-center gap-4 mb-6">
                <div class="flex items-center gap-2 md:gap-3">
                    <div class="p-2 rounded-xl w-8 h-8 md:w-10 md:h-10 flex items-center justify-center flex-shrink-0">
                        <svg class="text-black w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 2L15 9H22L16 14L18 21L12 17L6 21L8 14L2 9H9L12 2Z" />
                        </svg>
                    </div>
                    <h1 class="text-sm sm:text-lg md:text-2xl font-bold tracking-tight truncate">Food ordering system
                    </h1>
                </div>
                <button onclick="window.location.href = '/public/index.html'"
                    class="border border-gray-300 text-gray-600 px-3 md:px-5 py-2 rounded-xl text-[10px] sm:text-xs md:text-sm font-semibold hover:bg-gray-50 transition-all active:scale-95 whitespace-nowrap shadow-sm">
                    back to login
                </button>
            </div>

            <div class="flex justify-center mt-6 md:mt-10 px-4">
             <div class="flex bg-white rounded-full p-1.5 gap-1 overflow-x-auto no-scrollbar w-full max-w-xl shadow-lg border border-gray-100">
              <a href="/public/admin/Dashdoard_admin.html" class="flex-1 min-w-max text-center text-sm font-medium text-base-content/50 rounded-full px-5 py-2 hover:bg-base-300 transition-colors cursor-pointer">
                 Dashboard
              </a>
              <span class="flex-1 min-w-max text-center text-sm font-semibold text-white rounded-full px-5 py-2 cursor-default"
                  style="background-color: #1ac8db">Order
              </span>
              <a href="/public/admin/lisCook_admin.html" class="flex-1 min-w-max text-center text-sm font-medium text-base-content/50 rounded-full px-5 py-2 hover:bg-base-300 transition-colors cursor-pointer">
                 Cook
              </a>
              <a href="/public/admin/Menu_admin.html" class="flex-1 min-w-max text-center text-sm font-medium text-base-content/50 rounded-full px-5 py-2 hover:bg-base-300 transition-colors cursor-pointer">
               Menu
              </a>
             </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 md:px-12 space-y-6">

        <div class="flex gap-8 md:gap-16 border-b border-gray-100 pb-2">
            <a href="/view/admin/OrderNow_admin.html">
                <button class="text-gray-700 text-xl md:text-3xl font-bold hover:text-black transition-colors">Order
                    Now</button>
            </a>
            <button
                class="text-cyan-400 text-xl md:text-3xl font-bold">history</button>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto no-scrollbar">
                <table class="w-full text-center border-collapse">
                    <thead class="bg-gray-100">
                        <tr>
                            <th class="py-4 px-4 text-lg md:text-2xl font-bold text-gray-800">Order</th>
                            <th class="py-4 px-4 text-lg md:text-2xl font-bold text-gray-800">Date</th>
                            <th class="py-4 px-4 text-lg md:text-2xl font-bold text-gray-800">Amount</th>
                            <th class="py-4 px-4 text-lg md:text-2xl font-bold text-gray-800">Status</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-50">
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="py-5 px-4 text-base md:text-xl font-medium">Fried Rice</td>
                            <td class="py-5 px-4 text-base md:text-xl font-medium">10/01/25</td>
                            <td class="py-5 px-4 text-base md:text-xl font-medium">50</td>
                            <td class="py-5 px-4 text-base md:text-xl font-medium text-gray-700">Success</td>
                        </tr>
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="py-5 px-4 text-base md:text-xl font-medium">Pad Thai</td>
                            <td class="py-5 px-4 text-base md:text-xl font-medium">9/01/25</td>
                            <td class="py-5 px-4 text-base md:text-xl font-medium">60</td>
                            <td class="py-5 px-4 text-base md:text-xl font-medium text-gray-700">Success</td>
                        </tr>
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="py-5 px-4 text-base md:text-xl font-medium">omelet</td>
                            <td class="py-5 px-4 text-base md:text-xl font-medium">08/01/25</td>
                            <td class="py-5 px-4 text-base md:text-xl font-medium">70</td>
                            <td class="py-5 px-4 text-base md:text-xl font-medium text-gray-700">Success</td>
                        </tr>
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="py-5 px-4 text-base md:text-xl font-medium">Tom Yum Goong</td>
                            <td class="py-5 px-4 text-base md:text-xl font-medium">07/01/25</td>
                            <td class="py-5 px-4 text-base md:text-xl font-medium">50</td>
                            <td class="py-5 px-4 text-base md:text-xl font-medium font-bold">Success</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="h-10"></div>
    </main>

</body>

</html>
