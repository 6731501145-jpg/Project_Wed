<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Order-history</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
    font-family: 'Poppins', sans-serif;
}

.no-scrollbar::-webkit-scrollbar {
    display: none;
}

.no-scrollbar {
    -ms-overflow-style: none;
    scrollbar-width: none;
}

.picker-panel {
    display: none;
}

.picker-panel.open {
    display: block;
}

.month-cell:hover:not(.selected) {
    background-color: #e0f9fb;
    cursor: pointer;
}

.month-cell.selected {
    background-color: #1ac8db;
    color: white;
}

.nav-btn:hover {
    background-color: #f3f4f6;
    border-radius: 6px;
}

@keyframes fadeSlide {
    from {
        opacity: 0;
        transform: translateY(-6px);
    }

    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.animate-fadeslide {
    animation: fadeSlide 0.15s ease-out;
}

/* Day picker calendar styles */
.day-cell {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    color: #374151;
}

.day-cell:hover:not(.selected):not(.empty):not(.other-month) {
    background-color: #e0f9fb;
}

.day-cell.selected {
    background-color: #1ac8db;
    color: white;
    font-weight: 700;
}

.day-cell.today:not(.selected) {
    border: 2px solid #1ac8db;
    color: #1ac8db;
    font-weight: 700;
}

.day-cell.empty {
    cursor: default;
}

.day-cell.other-month {
    color: #d1d5db;
    cursor: default;
}

.day-header {
    width: 36px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    color: #9ca3af;
    text-transform: uppercase;
}
    </style>
</head>

<body class="bg-white min-h-screen no-scrollbar antialiased text-gray-800">

    <header>
        <div class="max-w-7xl mx-auto">
            <div class="max-w-7xl mx-auto px-4 md:px-8 py-4">
            <div class="flex justify-between items-center gap-4 mb-6">
                <div class="flex items-center gap-2 md:gap-3">
                    <div class="p-2 rounded-xl w-8 h-8 md:w-10 md:h-10 flex items-center justify-center flex-shrink-0">
                        <svg class="text-black w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 2L15 9H22L16 14L18 21L12 17L6 21L8 14L2 9H9L12 2Z" />
                        </svg>
                    </div>
                    <h1 class="text-sm sm:text-lg md:text-2xl font-bold tracking-tight truncate">Food ordering system
                    </h1>
                </div>
                <button onclick="logout()"
                    class="border border-gray-300 text-gray-600 px-3 md:px-5 py-2 rounded-xl text-[10px] sm:text-xs md:text-sm font-semibold hover:bg-gray-50 transition-all active:scale-95 whitespace-nowrap shadow-sm">
                    back to login
                </button>
            </div>

            <div class="flex justify-center mt-6 md:mt-10 px-4">
             <div class="flex bg-white rounded-full p-1.5 gap-1 overflow-x-auto no-scrollbar w-full max-w-xl shadow-lg border border-gray-100">
              <a href="/admin/dashboard" class="flex-1 min-w-max text-center text-sm font-medium text-base-content/50 rounded-full px-5 py-2 hover:bg-base-300 transition-colors cursor-pointer">
                 Dashboard
              </a>
              <span class="flex-1 min-w-max text-center text-sm font-semibold text-white rounded-full px-5 py-2 cursor-default"
                  style="background-color: #1ac8db">Order
              </span>
              <a href="/admin/cooks" class="flex-1 min-w-max text-center text-sm font-medium text-base-content/50 rounded-full px-5 py-2 hover:bg-base-300 transition-colors cursor-pointer">
                 Cook
              </a>
              <a href="/admin/menu" class="flex-1 min-w-max text-center text-sm font-medium text-base-content/50 rounded-full px-5 py-2 hover:bg-base-300 transition-colors cursor-pointer">
               Menu
              </a>
             </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 md:px-12 space-y-6">

        <div class="flex gap-8 md:gap-16 border-b border-gray-100 pb-2">
            <a href="/admin/order/now">
                <button class="text-gray-700 text-xl md:text-3xl font-bold hover:text-black transition-colors">Order
                    Now</button>
            </a>
            <button class="text-cyan-400 text-xl md:text-3xl font-bold">history</button>
        </div>

        <!-- Date Picker Dropdown -->
        <div class="relative inline-block text-left" id="dropdown-wrapper">
            <button id="dropdown-btn" onclick="toggleMain()"
                class="inline-flex items-center gap-x-2 rounded-xl bg-white px-4 py-2.5 text-sm font-semibold text-gray-700 shadow-sm border border-gray-200 hover:bg-gray-50 hover:border-gray-300 transition-all duration-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-gray-500" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                <span id="dropdown-label">Select Date</span>
                <svg viewBox="0 0 20 20" fill="currentColor" class="-mr-1 h-5 w-5 text-gray-400">
                    <path fill-rule="evenodd"
                        d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z"
                        clip-rule="evenodd" />
                </svg>
            </button>

            <!-- Main Menu -->
            <div id="main-menu"
                class="picker-panel animate-fadeslide absolute left-0 top-full mt-2 w-48 rounded-xl bg-white shadow-lg ring-1 ring-black ring-opacity-5 z-50">
                <div class="py-1">
                    <button onclick="selectToday()"
                        class="block w-full text-left px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-100 transition-colors">Today</button>
                    <button onclick="openSub('day')"
                        class="w-full flex justify-between items-center px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-100 transition-colors">
                        Select Day
                        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                        </svg>
                    </button>
                    <button onclick="openSub('week')"
                        class="w-full flex justify-between items-center px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-100 transition-colors">
                        Select Week
                        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                        </svg>
                    </button>
                    <button onclick="openSub('month')"
                        class="w-full flex justify-between items-center px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-100 transition-colors">
                        Select Month
                        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Day Picker (Calendar) -->
            <div id="day-picker"
                class="picker-panel animate-fadeslide absolute left-0 top-full mt-2 rounded-2xl bg-white shadow-xl ring-1 ring-black ring-opacity-5 z-50 p-4"
                style="min-width:300px">
                <div class="flex items-center justify-between mb-3">
                    <button onclick="openSub('back')"
                        class="text-gray-400 hover:text-gray-600 flex items-center gap-1 text-xs transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                        </svg> Back
                    </button>
                    <span class="text-sm font-semibold text-gray-700">Select Day</span>
                    <div class="w-10"></div>
                </div>
                <div class="flex items-center justify-between mb-3">
                    <div class="flex gap-1">
                        <button onclick="changeDayYearView(-1)" class="nav-btn p-1.5 transition-colors"
                            title="Previous Year"><svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M11 19l-7-7 7-7M19 19l-7-7 7-7" />
                            </svg></button>
                        <button onclick="changeDayView(-1)" class="nav-btn p-1.5 transition-colors"
                            title="Previous Month"><svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 19l-7-7 7-7" />
                            </svg></button>
                    </div>
                    <span id="day-view-label" class="text-sm font-bold text-gray-800"></span>
                    <div class="flex gap-1">
                        <button onclick="changeDayView(1)" class="nav-btn p-1.5 transition-colors"
                            title="Next Month"><svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M9 5l7 7-7 7" />
                            </svg></button>
                        <button onclick="changeDayYearView(1)" class="nav-btn p-1.5 transition-colors"
                            title="Next Year"><svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M13 5l7 7-7 7M5 5l7 7-7 7" />
                            </svg></button>
                    </div>
                </div>
                <div id="day-grid" class="grid grid-cols-7 gap-1 justify-items-center"></div>
            </div>

            <!-- Week Picker -->
            <div id="week-picker"
                class="picker-panel animate-fadeslide absolute left-0 top-full mt-2 rounded-2xl bg-white shadow-xl ring-1 ring-black ring-opacity-5 z-50 p-4"
                style="min-width:300px">
                <div class="flex items-center justify-between mb-3">
                    <button onclick="openSub('back')"
                        class="text-gray-400 hover:text-gray-600 flex items-center gap-1 text-xs transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                        </svg> Back
                    </button>
                    <span class="text-sm font-semibold text-gray-700">Select Week</span>
                    <div class="w-10"></div>
                </div>
                <div class="flex items-center justify-between mb-3">
                    <div class="flex gap-1">
                        <button onclick="changeWeekYearView(-1)" class="nav-btn p-1.5 transition-colors"
                            title="Previous Year"><svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M11 19l-7-7 7-7M19 19l-7-7 7-7" />
                            </svg></button>
                        <button onclick="changeWeekView(-1)" class="nav-btn p-1.5 transition-colors"
                            title="Previous Month"><svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 19l-7-7 7-7" />
                            </svg></button>
                    </div>
                    <span id="week-view-label" class="text-sm font-bold text-gray-800"></span>
                    <div class="flex gap-1">
                        <button onclick="changeWeekView(1)" class="nav-btn p-1.5 transition-colors"
                            title="Next Month"><svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M9 5l7 7-7 7" />
                            </svg></button>
                        <button onclick="changeWeekYearView(1)" class="nav-btn p-1.5 transition-colors"
                            title="Next Year"><svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M13 5l7 7-7 7M5 5l7 7-7 7" />
                            </svg></button>
                    </div>
                </div>
                <div id="week-list" class="flex flex-col gap-2 max-h-[280px] overflow-y-auto no-scrollbar pb-2"></div>
            </div>

            <!-- Month Picker -->
            <div id="month-picker"
                class="picker-panel animate-fadeslide absolute left-0 top-full mt-2 rounded-2xl bg-white shadow-xl ring-1 ring-black ring-opacity-5 z-50 p-4"
                style="min-width:260px">
                <div class="flex items-center justify-between mb-3">
                    <button onclick="openSub('back')"
                        class="text-gray-400 hover:text-gray-600 flex items-center gap-1 text-xs transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                        </svg> Back
                    </button>
                    <span class="text-sm font-semibold text-gray-700">Select Month</span>
                    <div class="w-10"></div>
                </div>
                <div class="flex items-center justify-between mb-3">
                    <button onclick="changeMonthYear(-1)" class="nav-btn p-1.5 transition-colors"><svg
                            class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                        </svg></button>
                    <span id="month-year-label" class="text-sm font-bold text-gray-800"></span>
                    <button onclick="changeMonthYear(1)" class="nav-btn p-1.5 transition-colors"><svg
                            class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                        </svg></button>
                </div>
                <div id="month-grid" class="grid grid-cols-3 gap-2 text-xs"></div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto no-scrollbar">
                <table class="w-full text-center border-collapse">
                    <thead class="bg-gray-100">
                        <tr>
                            <th class="py-4 px-4 text-lg md:text-2xl font-bold text-gray-800">Order</th>
                            <th class="py-4 px-4 text-lg md:text-2xl font-bold text-gray-800">Date</th>
                            <th class="py-4 px-4 text-lg md:text-2xl font-bold text-gray-800">Amount</th>
                            <th class="py-4 px-4 text-lg md:text-2xl font-bold text-gray-800">Status</th>
                        </tr>
                    </thead>
                    <tbody id="order-history-list" class="divide-y divide-gray-50">
                    </tbody>
                </table>
            </div>
        </div>

        <div class="h-10"></div>
    </main>

    <script src="/js/OrderHistory_admin.js"></script>
    <script src="/js/no-back.js"></script>
</body>

</html>
