<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/Dashboard_admin.css">
</head>

<body class="bg-white min-h-screen no-scrollbar antialiased text-gray-800 relative">

    <header>
        <div class="max-w-7xl mx-auto px-4 md:px-8 py-4">
            <div class="flex justify-between items-center gap-4 mb-6">
                <div class="flex items-center gap-2">
                    <span class="text-xl text-cyan-500">✦</span>
                    <h1 class="text-lg md:text-xl font-bold text-gray-800">Food ordering system</h1>
                </div>
                <button onclick="window.location.href='/public/index.html'"
                    class="border border-gray-300 text-gray-600 px-3 md:px-5 py-2 rounded-xl text-[10px] sm:text-xs md:text-sm font-semibold hover:bg-gray-50 transition-all active:scale-95 whitespace-nowrap shadow-sm">
                    back to login
                </button>
            </div>
            <div class="flex justify-center mt-6 md:mt-10 px-4">
                <div
                    class="flex bg-white rounded-full p-1.5 gap-1 overflow-x-auto no-scrollbar w-full max-w-xl shadow-lg border border-gray-100">
                    <span
                        class="flex-1 min-w-max text-center text-sm font-semibold text-white rounded-full px-5 py-2 cursor-default"
                        style="background-color:#1ac8db">Dashboard</span>
                    <a href="/public/admin/OrderNow_admin.html"
                        class="flex-1 min-w-max text-center text-sm font-medium text-gray-400 rounded-full px-5 py-2 hover:bg-gray-100 transition-colors cursor-pointer">Order</a>
                    <a href="/public/admin/lisCook_admin.html"
                        class="flex-1 min-w-max text-center text-sm font-medium text-gray-400 rounded-full px-5 py-2 hover:bg-gray-100 transition-colors cursor-pointer">Cook</a>
                    <a href="/public/admin/Menu_admin.html"
                        class="flex-1 min-w-max text-center text-sm font-medium text-gray-400 rounded-full px-5 py-2 hover:bg-gray-100 transition-colors cursor-pointer">Menu</a>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 md:px-12 space-y-8 pb-12">

        <div class="relative inline-block text-left" id="dropdown-wrapper">
            <button id="dropdown-btn" onclick="toggleMain()"
                class="inline-flex items-center gap-x-2 rounded-xl bg-white px-4 py-2.5 text-sm font-semibold text-gray-700 shadow-sm border border-gray-200 hover:bg-gray-50 hover:border-gray-300 transition-all duration-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-gray-500" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                <span id="dropdown-label">Select Date</span>
                <svg viewBox="0 0 20 20" fill="currentColor" class="-mr-1 h-5 w-5 text-gray-400">
                    <path fill-rule="evenodd"
                        d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z"
                        clip-rule="evenodd" />
                </svg>
            </button>

            <div id="main-menu"
                class="picker-panel animate-fadeslide absolute left-0 top-full mt-2 w-48 rounded-xl bg-white shadow-lg ring-1 ring-black ring-opacity-5 z-50">
                <div class="py-1">
                    <button onclick="selectToday()"
                        class="block w-full text-left px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-100 transition-colors">Today</button>
                    <button onclick="openSub('week')"
                        class="w-full flex justify-between items-center px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-100 transition-colors">
                        This Week
                        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                        </svg>
                    </button>
                    <button onclick="openSub('month')"
                        class="w-full flex justify-between items-center px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-100 transition-colors">
                        This Month
                        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                        </svg>
                    </button>
                </div>
            </div>

            <div id="week-picker"
                class="picker-panel animate-fadeslide absolute left-0 top-full mt-2 rounded-2xl bg-white shadow-xl ring-1 ring-black ring-opacity-5 z-50 p-4"
                style="min-width:300px">
                <div class="flex items-center justify-between mb-3">
                    <button onclick="openSub('back')"
                        class="text-gray-400 hover:text-gray-600 flex items-center gap-1 text-xs transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                        </svg> Back
                    </button>
                    <span class="text-sm font-semibold text-gray-700">Select Week</span>
                    <div class="w-10"></div>
                </div>
                <div class="flex items-center justify-between mb-3">
                    <div class="flex gap-1">
                        <button onclick="changeWeekYearView(-1)" class="nav-btn p-1.5 transition-colors"
                            title="Previous Year"><svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M11 19l-7-7 7-7M19 19l-7-7 7-7" />
                            </svg></button>
                        <button onclick="changeWeekView(-1)" class="nav-btn p-1.5 transition-colors"
                            title="Previous Month"><svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 19l-7-7 7-7" />
                            </svg></button>
                    </div>
                    <span id="week-view-label" class="text-sm font-bold text-gray-800"></span>
                    <div class="flex gap-1">
                        <button onclick="changeWeekView(1)" class="nav-btn p-1.5 transition-colors"
                            title="Next Month"><svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M9 5l7 7-7 7" />
                            </svg></button>
                        <button onclick="changeWeekYearView(1)" class="nav-btn p-1.5 transition-colors"
                            title="Next Year"><svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M13 5l7 7-7 7M5 5l7 7-7 7" />
                            </svg></button>
                    </div>
                </div>
                <div id="week-list" class="flex flex-col gap-2 max-h-[280px] overflow-y-auto no-scrollbar pb-2"></div>
            </div>

            <div id="month-picker"
                class="picker-panel animate-fadeslide absolute left-0 top-full mt-2 rounded-2xl bg-white shadow-xl ring-1 ring-black ring-opacity-5 z-50 p-4"
                style="min-width:260px">
                <div class="flex items-center justify-between mb-3">
                    <button onclick="openSub('back')"
                        class="text-gray-400 hover:text-gray-600 flex items-center gap-1 text-xs transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                        </svg> Back
                    </button>
                    <span class="text-sm font-semibold text-gray-700">Select Month</span>
                    <div class="w-10"></div>
                </div>
                <div class="flex items-center justify-between mb-3">
                    <button onclick="changeMonthYear(-1)" class="nav-btn p-1.5 transition-colors"><svg
                            class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                        </svg></button>
                    <span id="month-year-label" class="text-sm font-bold text-gray-800"></span>
                    <button onclick="changeMonthYear(1)" class="nav-btn p-1.5 transition-colors"><svg
                            class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                        </svg></button>
                </div>
                <div id="month-grid" class="grid grid-cols-3 gap-2 text-xs"></div>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-8">
            <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm flex items-center gap-5">
                <div
                    class="w-14 h-14 md:w-20 md:h-20 rounded-full bg-cyan-50 flex items-center justify-center text-cyan-500 flex-shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                        stroke="currentColor" class="size-6">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="m20.25 7.5-.625 10.632a2.25 2.25 0 0 1-2.247 2.118H6.622a2.25 2.25 0 0 1-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125Z" />
                    </svg>
                </div>
                <div>
                    <p class="text-gray-500 text-[10px] md:text-xs font-bold uppercase tracking-tighter">Customer Now
                    </p>
                    <p id="stat-customer-now" class="text-3xl md:text-4xl font-extrabold text-gray-800">0</p>
                </div>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm flex items-center gap-5">
                <div
                    class="w-14 h-14 md:w-20 md:h-20 rounded-full bg-orange-50 flex items-center justify-center text-orange-500 flex-shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                        stroke="currentColor" class="size-6">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="m7.875 14.25 1.214 1.942a2.25 2.25 0 0 0 1.908 1.058h2.006c.776 0 1.497-.4 1.908-1.058l1.214-1.942M2.41 9h4.636a2.25 2.25 0 0 1 1.872 1.002l.164.246a2.25 2.25 0 0 0 1.872 1.002h2.092a2.25 2.25 0 0 0 1.872-1.002l.164-.246A2.25 2.25 0 0 1 16.954 9h4.636M2.41 9a2.25 2.25 0 0 0-.16.832V12a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 12V9.832c0-.287-.055-.57-.16-.832M2.41 9a2.25 2.25 0 0 1 .382-.632l3.285-3.832a2.25 2.25 0 0 1 1.708-.786h8.43c.657 0 1.281.287 1.709.786l3.284 3.832c.163.19.291.404.382.632M4.5 20.25h15A2.25 2.25 0 0 0 21.75 18v-2.625c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125V18a2.25 2.25 0 0 0 2.25 2.25Z" />
                    </svg>
                </div>
                <div>
                    <p class="text-gray-500 text-[10px] md:text-xs font-bold uppercase tracking-tighter">Total Customers
                    </p>
                    <p id="stat-customers" class="text-3xl md:text-4xl font-extrabold text-gray-800">0</p>
                </div>
            </div>
            <div
                class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm flex items-center gap-5 sm:col-span-2 lg:col-span-1">
                <div
                    class="w-14 h-14 md:w-20 md:h-20 rounded-full bg-blue-50 flex items-center justify-center text-blue-500 flex-shrink-0">
                    <span class="text-2xl md:text-3xl font-bold">฿</span>
                </div>
                <div>
                    <p class="text-gray-500 text-[10px] md:text-xs font-bold uppercase tracking-tighter">Total Revenue
                    </p>
                    <p id="stat-revenue" class="text-3xl md:text-4xl font-extrabold text-gray-800">0</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 md:gap-12 pb-12">
            <section onclick="openModal('ranking-modal')"
                class="bg-gray-100 p-6 md:p-8 rounded-3xl border border-gray-100 shadow-sm hover:-translate-y-1 transition-transform cursor-pointer group flex flex-col">
                <div class="flex justify-between items-end mb-6">
                    <h3 class="text-2xl md:text-3xl font-bold text-gray-800">Foods Ranking</h3>
                    <span class="text-sm text-cyan-600 font-medium group-hover:underline flex items-center gap-1">View
                        All <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7">
                            </path>
                        </svg></span>
                </div>
                <div id="dashboard-ranking-preview" class="space-y-3 flex-1">
                </div>
            </section>

            <section onclick="openModal('review-modal')"
                class="bg-gray-100 p-6 md:p-8 rounded-3xl border border-gray-100 shadow-sm hover:-translate-y-1 transition-transform cursor-pointer group flex flex-col">
                <div class="flex justify-between items-end mb-6">
                    <h3 class="text-2xl md:text-3xl font-bold text-gray-800">Reviews</h3>
                    <span class="text-sm text-cyan-600 font-medium group-hover:underline flex items-center gap-1">View
                        All <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7">
                            </path>
                        </svg></span>
                </div>
                <div id="dashboard-review-preview" class="space-y-3 flex-1">
                </div>
            </section>
        </div>

    </main>

    <div id="ranking-modal"
        class="fixed inset-0 z-[100] hidden bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 sm:p-6"
        onclick="closeModalOutside(event, 'ranking-modal')">
        <div
            class="bg-gray-50 rounded-3xl w-full max-w-5xl h-[85vh] flex flex-col shadow-2xl overflow-hidden modal-enter">
            <div class="bg-white px-8 py-6 border-b border-gray-100 flex justify-between items-center shrink-0">
                <div>
                    <h2 class="text-3xl font-bold text-gray-800">Food Ranking</h2>
                    <p id="ranking-date-subtitle" class="text-sm text-gray-500 mt-1">Showing data for selected date</p>
                </div>
                <button onclick="closeModal('ranking-modal')"
                    class="p-2 bg-gray-100 hover:bg-gray-200 rounded-full text-gray-600 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                        </path>
                    </svg>
                </button>
            </div>
            <div class="p-4 sm:p-8 overflow-y-auto flex-1 custom-scrollbar">
                <div id="ranking-list" class="space-y-4 max-w-4xl mx-auto">
                </div>
                <div id="ranking-pagination" class="flex justify-center items-center gap-2 mt-8 pb-4">
                </div>
            </div>
        </div>
    </div>

    <div id="review-modal"
        class="fixed inset-0 z-[100] hidden bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 sm:p-6"
        onclick="closeModalOutside(event, 'review-modal')">
        <div
            class="bg-gray-50 rounded-3xl w-full max-w-5xl h-[85vh] flex flex-col shadow-2xl overflow-hidden modal-enter">
            <div class="bg-white px-8 py-6 border-b border-gray-100 flex justify-between items-center shrink-0">
                <div>
                    <h2 class="text-3xl font-bold text-gray-800">Customer Reviews</h2>
                    <p id="review-date-subtitle" class="text-sm text-gray-500 mt-1">Showing data for selected date</p>
                </div>
                <button onclick="closeModal('review-modal')"
                    class="p-2 bg-gray-100 hover:bg-gray-200 rounded-full text-gray-600 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                        </path>
                    </svg>
                </button>
            </div>
            <div class="p-4 sm:p-8 overflow-y-auto flex-1 custom-scrollbar">
                <div id="review-list" class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-5xl mx-auto">
                </div>
            </div>
        </div>
    </div>

    <script src="/js/Dashboard_admin.js"></script>
</body>

</html>
