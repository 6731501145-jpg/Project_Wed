<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>
  <body class="bg-base-100 min-h-screen flex flex-col">
    <div class="navbar bg-base-100 border-b border-base-200 px-4 md:px-10">
      <div class="flex-1 flex items-center gap-2">
        <span class="text-xl">✦</span>
        <span class="font-bold text-base md:text-lg">Food ordering system</span>
      </div>
      <div class="flex-none">
        <button
          class="btn btn-outline btn-sm rounded-xl text-sm"
          onclick="window.location.href = '/public/index.html'"
        >
          back to Home
        </button>
      </div>
    </div>

    <div class="flex flex-1 items-center justify-center px-4 py-12">
      <div class="w-full max-w-md">
        <h1 class="text-3xl font-bold mb-8">Welcome Admin</h1>

        <div class="mb-5">
          <label class="block text-sm font-medium mb-1">Username</label>
          <input
            id="admin_username"
            type="text"
            placeholder="Enter your Admin Username"
            class="input input-bordered w-full rounded-lg text-sm"
          />
        </div>

        <div class="mb-6">
          <label class="block text-sm font-medium mb-1">Password</label>
          <input
            id="password"
            type="password"
            placeholder="Enter your password"
            class="input input-bordered w-full rounded-lg text-sm"
          />
        </div>

        <button
          onclick="doLogin()"
          class="btn w-full rounded-lg text-white font-semibold text-base"
          style="background-color: #1AC8D8; border: none"
        >
          Sign in
        </button>
        
      </div>
    </div>

    <script>
      async function doLogin() {
        // เปลี่ยนมารับค่าจาก ID admin_username
        const adminUsername = document.getElementById("admin_username").value.trim();
        const password = document.getElementById("password").value;

        if (!adminUsername || !password) {
          Swal.fire({
            icon: "warning",
            title: "Incomplete",
            text: "Please fill in all fields",
            confirmButtonColor: "#1AC8DB",
          });
          return;
        }

        try {
          const response = await fetch('http://localhost:3000/admin/signin', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            // เปลี่ยน key เป็น admin_username ให้ตรงกับที่ API ฝั่ง Backend ต้องการ
            body: JSON.stringify({ admin_username: adminUsername, password: password })
          });

          if (response.ok) {
            const redirectPath = await response.text();
            Swal.fire({
              icon: "success",
              title: `Welcome Admin!`,
              text: "Sign in successful",
              confirmButtonColor: "#1AC8DB",
              timer: 1500,
              showConfirmButton: false
            }).then(() => {
              window.location.href = redirectPath; 
            });
          } else {
            const errorText = await response.text();
            Swal.fire({ icon: 'error', title: 'Login Failed', text: errorText, confirmButtonColor: "#1AC8DB" });
          }
        } catch (error) {
          console.error(error);
          Swal.fire({ icon: 'error', title: 'Error', text: 'Cannot connect to server', confirmButtonColor: "#1AC8DB" });
        }
      }

      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !Swal.isVisible()) doLogin();
      });
    </script>
  </body>
</html>
