<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Cooks</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-white p-6 md:p-12 min-h-screen">

    <header class="flex justify-between items-center mb-10 max-w-6xl mx-auto">
        <div class="flex items-center gap-2">
      <span class="text-xl">✦</span>
      <h1 class="text-xl font-bold">Food ordering system</h1>
    </div>
        <button onclick="logout()" class="border border-gray-300 bg-white px-5 py-1.5 rounded-lg text-sm font-medium hover:bg-gray-50 transition-all">
            back to login
        </button>
    </header>

    <div class="flex justify-center mt-6 md:mt-10 px-4">
      <div class="flex bg-white rounded-full p-1.5 gap-1 overflow-x-auto no-scrollbar w-full max-w-xl shadow-lg border border-gray-100">
        <a href="/admin/dashboard" class="flex-1 min-w-max text-center text-sm font-medium text-base-content/50 rounded-full px-5 py-2 hover:bg-base-300 transition-colors cursor-pointer">
          Dashboard
        </a>
        <a href="/admin/order/now" class="flex-1 min-w-max text-center text-sm font-medium text-base-content/50 rounded-full px-5 py-2 hover:bg-base-300 transition-colors cursor-pointer">
          Order
        </a>
        <span class="flex-1 min-w-max text-center text-sm font-semibold text-white rounded-full px-5 py-2 cursor-default"
          style="background-color: #1ac8db">Cook
        </span>
        <a href="/admin/menu" class="flex-1 min-w-max text-center text-sm font-medium text-base-content/50 rounded-full px-5 py-2 hover:bg-base-300 transition-colors cursor-pointer">
          Menu
        </a>
      </div>
    </div>
    <main id="cook_display" class="grid grid-cols-1 mt-6 sm:grid-cols-2 lg:grid-cols-3 gap-10 max-w-6xl mx-auto">
        </main>

    <div id="cookModal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-5 backdrop-blur-[2px]">
        <div class="bg-white rounded-[2rem] w-full max-w-md p-10 shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <h2 id="modalTitle" class="text-2xl font-black text-gray-800">Add New Cook</h2>
                <button onclick="toggleModal(false)" class="text-gray-400 hover:text-black text-3xl">&times;</button>
            </div>
            
            <form id="cookForm" class="space-y-6">
                <input type="hidden" id="editIndex" value="-1">
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 mb-2 uppercase tracking-widest">Firstname</label>
                        <input type="text" id="firstName" required placeholder="Enter first name" class="w-full bg-gray-50 border border-gray-100 rounded-xl p-4 focus:ring-2 focus:ring-cyan-400 transition-all outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 mb-2 uppercase tracking-widest">Surname</label>
                        <input type="text" id="surName" required placeholder="Enter surname" class="w-full bg-gray-50 border border-gray-100 rounded-xl p-4 focus:ring-2 focus:ring-cyan-400 transition-all outline-none">
                    </div>
                </div>

                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="toggleModal(false)" class="flex-1 py-4 bg-gray-100 text-gray-500 rounded-xl font-bold hover:bg-gray-200 transition-all">Cancel</button>
                    <button type="submit" class="flex-1 py-4 bg-cyan-400 text-white rounded-xl font-bold shadow-lg shadow-cyan-100 hover:bg-cyan-500 transition-all">Save Info</button>
                </div>
            </form>
        </div>
    </div>

    <script>
    // ข้อมูลเริ่มต้น
    let cooks = [];

// 1. ดึงข้อมูลพ่อครัวทั้งหมด
async function fetchCooks() {
    try {
        const response = await fetch('/admin/cooks/data');
        if (!response.ok) throw new Error('ไม่สามารถดึงข้อมูลได้');
        cooks = await response.json();
        showCooks();
    } catch (error) {
        console.error('Error:', error);
        Swal.fire('ข้อผิดพลาด', 'โหลดข้อมูลไม่สำเร็จ', 'error');
    }
}

// 2. แสดงผลการ์ดพ่อครัว
function showCooks() {
    let data = `
    <div onclick="openAddModal()" class="cursor-pointer border-2 border-green-400 border-dashed rounded-3xl flex items-center justify-center min-h-[320px] bg-white hover:bg-green-50 transition-all group shadow-sm">
        <div class="flex flex-col items-center">
            <span class="text-8xl text-green-400 font-thin group-hover:scale-110 transition-transform">+</span>
            <span class="text-green-500 font-semibold mt-2">เพิ่มพ่อครัวใหม่</span>
        </div>
    </div>`;

    cooks.forEach(function (cook, index) {
        const isActive = cook.status === 'active';
        data += `
        <div class="bg-gray-50 p-8 rounded-3xl flex flex-col items-center justify-between text-center border border-transparent ${isActive ? 'hover:border-gray-200' : 'opacity-50 grayscale'} transition-all shadow-sm">
            <div class="mb-6">
                <p class="text-gray-400 font-medium mb-2 text-sm uppercase tracking-widest">ID: ${cook.id}</p>
                <h3 class="text-2xl font-bold text-gray-800">${cook.fname} ${cook.lname}</h3>
                <div class="mt-2">
                    <span class="px-3 py-1 rounded-full text-xs font-bold ${isActive ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}">
                        ${isActive ? '● กำลังใช้งาน' : '● ปิดใช้งาน'}
                    </span>
                </div>
            </div>
            <div class="flex gap-4 w-full">
                <button onclick="toggleCookStatus('${cook.id}', ${isActive ? 0 : 1})" 
                        class="flex-1 ${isActive ? 'bg-slate-500 hover:bg-slate-600' : 'bg-green-500 hover:bg-green-600'} text-white py-3 rounded-xl font-bold transition-all shadow-sm">
                    ${isActive ? 'ปิดใช้งาน' : 'เปิดใช้งาน'}
                </button>
                <button onclick="Edit(${index})" class="flex-1 bg-orange-400 text-white py-3 rounded-xl font-bold hover:bg-orange-500 transition-all shadow-sm">แก้ไข</button>
            </div>
        </div>`;
    });
    document.querySelector('#cook_display').innerHTML = data;
}

// 3. ฟังก์ชันบันทึกข้อมูลพร้อมเช็คชื่อซ้ำ
document.getElementById('cookForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const fname = document.getElementById('firstName').value.trim();
    const lname = document.getElementById('surName').value.trim();
    const index = document.getElementById('editIndex').value;

    // เช็คชื่อซ้ำเบื้องต้นที่หน้าบ้าน (กรณีเพิ่มใหม่)
    if (index === "-1") {
        const isDuplicate = cooks.some(c => c.fname.toLowerCase() === fname.toLowerCase() && c.lname.toLowerCase() === lname.toLowerCase());
        if (isDuplicate) {
            return Swal.fire('ชื่อซ้ำ!', 'มีพ่อครัวชื่อนี้อยู่ในระบบแล้ว', 'warning');
        }
    }
    
    try {
        if (index === "-1") {
            // ส่งไปเช็คซ้ำที่หลังบ้านอีกครั้งและบันทึก
            const res = await fetch('/admin/cooks/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fname, lname })
            });
            
            if (res.status === 400) {
                const msg = await res.text();
                return Swal.fire('แจ้งเตือน', msg, 'warning');
            }
            if (!res.ok) throw new Error('บันทึกไม่สำเร็จ');
            
        } else {
            // แก้ไขข้อมูล
            const cookId = cooks[index].id;
            const res = await fetch(`/admin/cooks/${cookId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fname, lname })
            });
            if (!res.ok) throw new Error('แก้ไขไม่สำเร็จ');
        }
        
        toggleModal(false);
        fetchCooks();
        Swal.fire('สำเร็จ', 'บันทึกข้อมูลเรียบร้อย', 'success');
    } catch (error) {
        Swal.fire('ข้อผิดพลาด', error.message, 'error');
    }
});

// 4. ฟังก์ชัน เปิด-ปิด สถานะการใช้งาน (แทนการลบ)
async function toggleCookStatus(id, newStatus) {
    const actionText = newStatus === 1 ? 'เปิดใช้งาน' : 'ปิดใช้งาน';
    
    const result = await Swal.fire({
        title: `ยืนยันการ${actionText}?`,
        text: `พ่อครัวจะไม่สามารถเข้าระบบได้หากถูกปิดใช้งาน`,
        icon: "question",
        showCancelButton: true,
        confirmButtonColor: newStatus === 1 ? "#22c55e" : "#64748b",
        confirmButtonText: `ใช่, ${actionText}`,
        cancelButtonText: 'ยกเลิก'
    });

    if (result.isConfirmed) {
        try {
            const res = await fetch(`/admin/cooks/${id}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ active_status: newStatus })
            });
            if (res.ok) {
                fetchCooks();
                Swal.fire('เรียบร้อย', `เปลี่ยนสถานะเป็น${actionText}แล้ว`, 'success');
            }
        } catch (error) {
            Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเปลี่ยนสถานะได้', 'error');
        }
    }
}

// ฟังก์ชันเสริมอื่นๆ
function toggleModal(isOpen) {
    document.getElementById('cookModal').classList.toggle('hidden', !isOpen);
}

function openAddModal() {
    document.getElementById('modalTitle').innerText = "เพิ่มพ่อครัว";
    document.getElementById('editIndex').value = "-1";
    document.getElementById('cookForm').reset();
    toggleModal(true);
}

function Edit(index) {
    const cook = cooks[index];
    document.getElementById('modalTitle').innerText = "แก้ไขข้อมูล";
    document.getElementById('firstName').value = cook.fname;
    document.getElementById('surName').value = cook.lname;
    document.getElementById('editIndex').value = index;
    toggleModal(true);
}

window.onclick = (e) => { if (e.target == document.getElementById('cookModal')) toggleModal(false); }

// เรียกใช้งานครั้งแรก
fetchCooks();

    function logout() {
    // วิ่งไปที่ Route logout โดยตรง Browser จะจัดการเปลี่ยนหน้าตาม res.redirect('/') เอง
    window.location.href = '/logout';
}
    </script>
</body>
</html>
