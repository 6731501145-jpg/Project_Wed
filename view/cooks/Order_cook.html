<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order_cook_Pending</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5.5.19/daisyui.min.css" rel="stylesheet" />
    <style>
        /* ซ่อน scrollbar สำหรับเมนูที่เลื่อนได้ */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">


    <nav class="bg-white shadow-sm px-4 md:px-6 py-4 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <span class="text-xl text-cyan-500">✦</span>
            <h1 class="text-lg md:text-xl font-bold text-gray-800">Food ordering system</h1>
        </div>
        <button onclick="logout()"
            class="border border-gray-300 rounded-xl px-4 py-1.5 text-xs md:text-sm font-medium text-gray-600 hover:bg-gray-50 transition-all">
            Logout
        </button>
    </nav>


    <main class="max-w-4xl mx-auto p-4 md:p-6">
       
        <div class="flex justify-center mb-8">
            <div class="flex bg-white rounded-full p-1.5 gap-1 w-full max-w-sm shadow-md border border-gray-100">
                <a href="/view/cooks/Dashdoard_cook.html" class="flex-1 text-center text-sm font-medium text-gray-400 rounded-full py-2 hover:bg-gray-100 transition-colors">
                    Dashboard
                </a>
                <span class="flex-1 text-center text-sm font-semibold text-white rounded-full py-2 shadow-sm" style="background-color: #1ac8db">
                    Order
                </span>
            </div>
        </div>


        <div class="flex justify-center mb-8">
            <div class="flex w-full max-w-md border-b border-gray-200">
                <button class="flex-1 text-center py-3 font-bold text-cyan-500 border-b-2 border-cyan-500 transition-all">
                    Order Now
                </button>
                <a href="/view/cooks/OrdeCooking_cook.html" class="flex-1 text-center py-3 font-semibold text-gray-400 hover:text-cyan-500">
                    Cooking
                </a>
                <a href="/view/cooks/OrdeCooking_cook2.html" class="flex-1 text-center py-3 font-semibold text-gray-400 hover:text-cyan-500">
                    Done
                </a>
            </div>
        </div>


        <div id="orders-list" class="flex flex-col gap-4"></div>
    </main>


    <script>
      const statusFilter = 'pending';
      const statusLabel = { pending: 'pending', cooking: 'cooking', serving: 'done' };
      const API_BASE = window.location.port === '3000' ? '' : 'http://localhost:3000';


      const ordersList = document.getElementById('orders-list');


      function renderEmpty() {
        ordersList.innerHTML = `
          <div class="text-center py-20">
            <div class="text-4xl mb-2 opacity-20">📋</div>
            <p class="text-gray-400 text-sm font-medium italic">No orders yet</p>
          </div>
        `;
      }


      function renderOrders(orders) {
        if (!orders || orders.length === 0) {
          return renderEmpty();
        }


        ordersList.innerHTML = orders.map(order => {
          const itemsHtml = order.items.map(item => `
            <li class="text-sm text-gray-600">• ${item.menu_name} x${item.quantity}</li>
          `).join('');


          const statusBtn = (label, targetStatus, active) => `
            <button onclick="changeStatus(${order.order_id}, '${targetStatus}')"
              class="flex-1 md:flex-none px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-wider ${active ? 'bg-orange-400 text-white shadow-sm shadow-orange-100' : 'text-gray-400 hover:bg-gray-50'}">
              ${label}
            </button>
          `;


          return `
            <div class="bg-white rounded-2xl p-5 md:px-6 md:py-4 flex flex-col md:flex-row md:items-center gap-4 shadow-sm border border-gray-100 hover:shadow-md transition-all">
              <div class="flex-1">
                <div class="flex justify-between items-center md:justify-start md:gap-8">
                  <div>
                    <p class="font-bold text-gray-800 text-lg md:min-w-[120px]">Order #${order.order_id}</p>
                    <ul class="mt-1 space-y-0.5">${itemsHtml}</ul>
                  </div>
                  <span class="text-sm bg-gray-100 px-3 py-1 rounded-lg text-gray-500 font-medium">Table ${order.table_number}</span>
                </div>
              </div>
              <div class="flex items-center justify-between md:justify-end gap-2 border-t md:border-t-0 pt-3 md:pt-0">
                ${statusBtn('pending', 'pending', order.status === 'pending')}
                ${statusBtn('cooking', 'cooking', order.status === 'cooking')}
                ${statusBtn('done', 'serving', order.status === 'serving')}
              </div>
            </div>
          `;
        }).join('');
      }


      function changeStatus(orderId, status) {
        fetch(`${API_BASE}/cook/order/${orderId}/status`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status })
        }).then(res => {
          if (!res.ok) throw new Error('Failed to update');
          return fetchOrders();
        }).catch(err => alert(err.message));
      }


      function fetchOrders() {
        ordersList.innerHTML = '<div class="text-center text-gray-400 py-10">Loading...</div>';
        const url = statusFilter ? `${API_BASE}/cook/order?status=${statusFilter}` : `${API_BASE}/cook/order`;
        fetch(url)
          .then(res => res.json())
          .then(renderOrders)
          .catch(() => {
            ordersList.innerHTML = '<div class="text-center text-red-500 py-10">Error loading orders</div>';
          });
      }
      function logout() {
        localStorage.clear(); 
    sessionStorage.clear();
    // วิ่งไปที่ Route logout โดยตรง Browser จะจัดการเปลี่ยนหน้าตาม res.redirect('/') เอง
    window.location.href = '/logout';
}


      fetchOrders();
    </script>


</body>
</html>
