<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cooks Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/Dashboard_cook.css">
</head>

<body class="bg-white min-h-screen custom-scrollbar antialiased text-gray-800 relative">

    <header>
        <div class="max-w-7xl mx-auto px-4 md:px-8 py-4">
            <div class="flex justify-between items-center gap-4 mb-6">
                <div class="flex items-center gap-2">
                    <span class="text-xl text-cyan-500">✦</span>
                    <h1 class="text-lg md:text-xl font-bold text-gray-800">Food ordering system</h1>
                </div>
                <button onclick="logout()"
                    class="border border-gray-300 text-gray-600 px-3 md:px-5 py-2 rounded-xl text-[10px] sm:text-xs md:text-sm font-semibold hover:bg-gray-50 transition-all active:scale-95 whitespace-nowrap shadow-sm">
                    Logout
                </button>
            </div>

            <div class="flex justify-center mt-6 md:mt-10 px-4">
                <div
                    class="flex bg-gray-100 rounded-full p-1.5 gap-1 overflow-x-auto w-full max-w-lg shadow-sm border border-gray-200">
                    <span
                        class="flex-1 min-w-max text-center text-sm font-semibold text-white rounded-full px-5 py-2 cursor-default"
                        style="background-color: #1ac8db">Dashboard
                    </span>
                    <a href="/cook/orderoper"
                        class="flex-1 min-w-max text-center text-sm font-medium text-gray-500 rounded-full px-5 py-2 hover:bg-gray-200 transition-colors cursor-pointer">
                        Order
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 md:px-12 space-y-8 pb-12 mt-6">

        <div
            class="bg-gray-100 rounded-3xl p-8 md:p-16 shadow-sm border border-gray-200 flex flex-col md:flex-row items-center justify-center gap-8 md:gap-32">
            <div class="text-center md:text-left">
                <h2 class="text-3xl md:text-4xl font-bold text-gray-800 leading-tight">
                    Number of Served menus
                </h2>
            </div>
            <div
                class="bg-white rounded-3xl p-6 md:p-10 shadow-sm border border-gray-100 flex items-center justify-center min-w-[160px] md:min-w-[200px]">
                <span id="stat-orders-count"
                    class="text-6xl md:text-8xl font-black text-cyan-500 drop-shadow-sm">0</span>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 md:gap-12 pb-12">

            <section onclick="openModal('ranking-modal')"
                class="bg-gray-100 p-6 md:p-8 rounded-3xl border border-gray-100 shadow-sm hover:-translate-y-1 transition-transform cursor-pointer group flex flex-col h-full">
                <div class="flex justify-between items-end mb-6">
                    <h3 class="text-2xl md:text-3xl font-bold text-gray-800">Foods Ranking</h3>
                    <span class="text-sm text-cyan-600 font-medium group-hover:underline flex items-center gap-1">View
                        All <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7">
                            </path>
                        </svg></span>
                </div>
                <div id="dashboard-ranking-preview" class="space-y-3 flex-1">
                </div>
            </section>

            <section onclick="openModal('review-modal')"
                class="bg-gray-100 p-6 md:p-8 rounded-3xl border border-gray-100 shadow-sm hover:-translate-y-1 transition-transform cursor-pointer group flex flex-col h-full">
                <div class="flex justify-between items-end mb-6">
                    <h3 class="text-2xl md:text-3xl font-bold text-gray-800">Reviews</h3>
                    <span class="text-sm text-cyan-600 font-medium group-hover:underline flex items-center gap-1">View
                        All <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7">
                            </path>
                        </svg></span>
                </div>
                <div id="dashboard-review-preview" class="space-y-3 flex-1">
                </div>
            </section>

        </div>

    </main>

    <div id="ranking-modal"
        class="fixed inset-0 z-[100] hidden bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 sm:p-6"
        onclick="closeModalOutside(event, 'ranking-modal')">
        <div
            class="bg-gray-50 rounded-3xl w-full max-w-5xl h-[85vh] flex flex-col shadow-2xl overflow-hidden modal-enter">
            <div class="bg-white px-8 py-6 border-b border-gray-100 flex justify-between items-center shrink-0">
                <div>
                    <h2 class="text-3xl font-bold text-gray-800">Live Food Ranking</h2>
                    <p class="text-sm text-cyan-600 font-medium mt-1">• Real-time Data</p>
                </div>
                <button onclick="closeModal('ranking-modal')"
                    class="p-2 bg-gray-100 hover:bg-gray-200 rounded-full text-gray-600 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                        </path>
                    </svg>
                </button>
            </div>
            <div class="p-4 sm:p-8 overflow-y-auto flex-1 custom-scrollbar">
                <div id="ranking-list" class="space-y-4 max-w-4xl mx-auto">
                </div>
            </div>
        </div>
    </div>

    <div id="review-modal"
        class="fixed inset-0 z-[100] hidden bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 sm:p-6"
        onclick="closeModalOutside(event, 'review-modal')">
        <div
            class="bg-gray-50 rounded-3xl w-full max-w-5xl h-[85vh] flex flex-col shadow-2xl overflow-hidden modal-enter">
            <div class="bg-white px-8 py-6 border-b border-gray-100 flex justify-between items-center shrink-0">
                <div>
                    <h2 class="text-3xl font-bold text-gray-800">Live Customer Reviews</h2>
                    <p class="text-sm text-cyan-600 font-medium mt-1">• Real-time Data</p>
                </div>
                <button onclick="closeModal('review-modal')"
                    class="p-2 bg-gray-100 hover:bg-gray-200 rounded-full text-gray-600 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                        </path>
                    </svg>
                </button>
            </div>
            <div class="p-4 sm:p-8 overflow-y-auto flex-1 custom-scrollbar">
                <div id="review-list" class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-5xl mx-auto">
                </div>
            </div>
        </div>
    </div>

    <script src="/js/Dashboard_cook.js"></script>
    <script src="/js/no-back.js"></script>
</body>

</html>
